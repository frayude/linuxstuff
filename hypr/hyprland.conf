################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,1

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 20

    border_size = 0

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = false
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

# Apps
bind = SUPER, RETURN, exec, ghostty
bind = SUPER, C, exec, code
bind = SUPER SHIFT, RETURN, exec, ghostty --class=com.ghostty.floating
bind = SUPER SHIFT, B, exec, blueman-manager                            # Bluetooth
bind = SUPER, A, exec, pkill rofi || rofi -show drun                    # App Launcher
bind = SUPER, B, exec, flatpak run com.brave.Browser || code
bind = SUPER, E, exec, nautilus                                         # File Manager
bind = SUPER, M, exec, gnome-system-monitor 

# Scripts
bind = SUPER, V, exec, ~/.config/hypr/scripts/clipboard.sh
bind = SUPER, S, exec, ~/.config/hypr/scripts/screenshot-instant.sh
bind = SUPER SHIFT, S, exec, ~/.config/hypr/scripts/screenshot-area.sh

# Window
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER, TAB, cyclenext
bind = SUPER, J, layoutmsg, togglesplit     # Swap window to vertical
bind = SUPER, K, swapnext,                  # Swap Window
bind = SUPER, L, exec, hyprctl dispatch togglefloating && hyprctl dispatch centerwindow         

# Window Resize
binde = SUPER SHIFT, equal, resizeactive, 0 10%
binde = SUPER SHIFT, minus, resizeactive, 0 -10%
binde = SUPER, equal, resizeactive, 10% 0
binde = SUPER, minus, resizeactive, -10% 0

# System
bind = SUPER, Q, killactive,
bind = SUPER SHIFT, Q, exec, ~/.config/hypr/scripts/close-all-workspace.sh
bind = SUPER CTRL, Q, exec, pkill wlogout || wlogout 
bind = SUPER SHIFT, W, exec, pkill waybar; waybar


# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
; bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
; bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
; bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
; bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
; bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
; bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Volume Control OSD
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+ && ~/.config/hypr/scripts/volume-osd.sh
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%- && ~/.config/hypr/scripts/volume-osd.sh
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && ~/.config/hypr/scripts/volume-osd.sh

# Brightness Control OSD
binde = , XF86MonBrightnessUp, exec, brightnessctl set 1%+ && ~/.config/hypr/scripts/brightness-osd.sh
binde = , XF86MonBrightnessDown, exec, brightnessctl set 1%- && ~/.config/hypr/scripts/brightness-osd.sh

# Capslock OSD
bind = , Caps_Lock, exec, ~/.config/hypr/scripts/capslock.sh

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS RULES ###
##############################
windowrule = match:class org.gnome.Loupe, maximize on                       # Image Viewer
windowrule = match:class org.gnome.Nautilus, float on  center on            # File Manager
windowrule = match:class ^(blueman-manager)$, float on  center on           # Bluetooth Manager
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on  center on    # File save popup
windowrule = match:class ^(org.gnome.SystemMonitor)$, float on  center on  
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on  center on, size 800 600 

windowrule{
    name = Ghostty floating
    match:class = com.ghostty.floating

    float = true
    center = true
    size = 800 500
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}