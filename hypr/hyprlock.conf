general {
    hide_cursor = true
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /path/to/your/wallpaper.png   # Ganti ke path wallpaper lu
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # Makin tinggi makin blur ala GNOME
    blur_size = 7
    noise = 0.0117
}

# JAM (Style GNOME - Besar dan Bold)
label {
    monitor =
    text = $TIME
    color = rgba(242, 242, 242, 0.75)
    font_size = 95
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 300
    halign = center
    valign = center
}

# USER (Foto Profil Bulat)
image {
    monitor =
    path = /path/to/your/profile_picture.png # Ganti ke foto lu
    size = 150
    border_size = 4
    border_color = rgba(255, 255, 255, 0.6)
    position = 0, 75
    halign = center
    valign = center
}

# INPUT FIELD (Tempat Password ala GNOME)
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# JAM (Besar & Bold)
label {
    monitor =
    text = $TIME
    color = rgba(242, 242, 242, 0.8)
    font_size = 95
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 300
    halign = center
    valign = center
}

# TANGGAL (Gaya GNOME - Di bawah Jam)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +'%A, %d %B')</span>"
    color = rgba(242, 242, 242, 0.6)
    font_size = 22
    font_family = JetBrains Mono Nerd Font
    position = 0, 200 # Jaraknya di bawah jam
    halign = center
    valign = center
}